<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHI 2026 Visual Search</title>
  <link rel="stylesheet" href="assets/visual_search.css?v=20260418-map">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
</head>
<body>
  <main>
    <section id="mapPane">
      <header>
        <div>
          <h1>CHI 2026 Visual Search</h1>
          <p>検索語から始めて、気になる論文へ探索を広げます。</p>
          <div class="legend">
            <span><span class="dot query-dot"></span>query / selected paper</span>
            <span><span class="dot paper-dot"></span>nearby papers</span>
          </div>
        </div>
        <form id="searchForm">
          <input id="query" name="q" value="視覚障害者のナビゲーション アクセシビリティ" autocomplete="off" aria-label="検索語">
          <button id="submit" type="submit">検索</button>
        </form>
      </header>
      <div id="mapStage">
        <div class="mapControls" aria-label="マップ操作">
          <button id="zoomIn" class="map-button" type="button">+</button>
          <button id="zoomOut" class="map-button" type="button">-</button>
          <button id="fitMap" class="map-button" type="button">全体</button>
        </div>
        <div id="chart"></div>
      </div>
    </section>
    <aside id="sidePane">
      <div id="status">読み込み中</div>
      <div id="detail" class="empty">マップ上の点、または検索結果を選択してください。</div>
      <ol id="results"></ol>
    </aside>
  </main>
  <script src="assets/visual_search.js?v=20260418-map"></script>
</body>
</html>
