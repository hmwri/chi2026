<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHI 2026 Visual Search</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d1f24;
      --muted: #5d6572;
      --line: #d8dde5;
      --paper: #f7f8fa;
      --accent: #0b7f79;
      --accent-2: #b2456e;
      --mark: #e1b12c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }
    main {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(340px, 440px) 1fr;
    }
    aside {
      padding: 24px;
      border-right: 1px solid var(--line);
      background: #ffffff;
      overflow: auto;
    }
    section {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.6;
    }
    form {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }
    input, button {
      min-height: 44px;
      border-radius: 8px;
      font: inherit;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
    }
    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    button:disabled {
      cursor: wait;
      opacity: .72;
    }
    #status {
      min-height: 24px;
      margin-bottom: 12px;
      color: var(--muted);
    }
    ol {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }
    li {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    li.active {
      border-color: var(--accent);
      box-shadow: inset 4px 0 0 var(--accent);
    }
    .rank {
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .title {
      font-weight: 700;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .title-en {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .meta, .snippet {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 8px;
    }
    .map-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .legend {
      display: flex;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: -1px;
    }
    .query-dot { background: var(--mark); }
    .paper-dot { background: var(--accent-2); }
    #mapWrap {
      min-height: 0;
      position: relative;
      background:
        linear-gradient(#eef1f5 1px, transparent 1px),
        linear-gradient(90deg, #eef1f5 1px, transparent 1px);
      background-size: 44px 44px;
    }
    svg {
      width: 100%;
      height: 100%;
      min-height: 560px;
      display: block;
    }
    .point {
      cursor: pointer;
      stroke: #fff;
      stroke-width: 2;
    }
    .label {
      font-size: 13px;
      fill: var(--ink);
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .score-line {
      stroke: #99a2af;
      stroke-width: 1.5;
      stroke-dasharray: 5 5;
    }
    a { color: var(--accent); }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      svg { min-height: 460px; }
    }
  </style>
</head>
<body>
  <main>
    <aside>
      <h1>CHI 2026 Visual Search</h1>
      <p>検索語を入力すると、近い論文を2次元マップ上に表示します。日本語と英語の両方で検索できます。</p>
      <form id="searchForm">
        <input id="query" name="q" value="視覚障害者のナビゲーション アクセシビリティ" autocomplete="off" aria-label="検索語">
        <button id="submit" type="submit">検索</button>
      </form>
      <div id="status">待機中</div>
      <ol id="results"></ol>
    </aside>
    <section>
      <div class="map-head">
        <strong>Similarity Map</strong>
        <div class="legend">
          <span><span class="dot query-dot"></span>query</span>
          <span><span class="dot paper-dot"></span>paper</span>
        </div>
      </div>
      <div id="mapWrap">
        <svg id="map" role="img" aria-label="検索結果の2次元マップ"></svg>
      </div>
    </section>
  </main>
  <script>
    const form = document.querySelector("#searchForm");
    const queryInput = document.querySelector("#query");
    const statusEl = document.querySelector("#status");
    const resultsEl = document.querySelector("#results");
    const svg = document.querySelector("#map");
    const button = document.querySelector("#submit");
    let currentResults = [];
    let activeId = null;
    let lastQueryPoint = null;

    function padExtent(values) {
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = Math.max(max - min, 0.0001);
      return [min - span * 0.2, max + span * 0.2];
    }

    function scale(value, domain, range) {
      return range[0] + ((value - domain[0]) / (domain[1] - domain[0])) * (range[1] - range[0]);
    }

    function clearSvg() {
      while (svg.firstChild) svg.removeChild(svg.firstChild);
    }

    function node(name, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [key, value] of Object.entries(attrs)) el.setAttribute(key, value);
      return el;
    }

    function renderMap(data) {
      clearSvg();
      const rect = svg.getBoundingClientRect();
      const width = Math.max(rect.width, 320);
      const height = Math.max(rect.height, 460);
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

      const points = [{...data.query_point, id: "query"}, ...data.results];
      const xDomain = padExtent(points.map(p => p.x));
      const yDomain = padExtent(points.map(p => p.y));
      const xRange = [54, width - 54];
      const yRange = [height - 54, 54];
      const queryX = scale(data.query_point.x, xDomain, xRange);
      const queryY = scale(data.query_point.y, yDomain, yRange);

      for (const result of data.results) {
        const x = scale(result.x, xDomain, xRange);
        const y = scale(result.y, yDomain, yRange);
        svg.appendChild(node("line", {
          x1: queryX, y1: queryY, x2: x, y2: y, class: "score-line", opacity: Math.max(.18, result.score)
        }));
      }

      svg.appendChild(node("circle", {
        cx: queryX, cy: queryY, r: 12, fill: "#e1b12c", class: "point"
      }));
      svg.appendChild(node("text", {
        x: queryX + 14, y: queryY - 14, class: "label"
      })).textContent = "query";

      data.results.forEach((result, index) => {
        const x = scale(result.x, xDomain, xRange);
        const y = scale(result.y, yDomain, yRange);
        const radius = 8 + Math.max(0, result.score - data.results[data.results.length - 1].score) * 70;
        const circle = node("circle", {
          cx: x, cy: y, r: Math.min(radius, 18), fill: "#b2456e", class: "point",
          "data-id": result.id
        });
        circle.addEventListener("click", () => setActive(result.id));
        svg.appendChild(circle);
        const label = node("text", { x: x + 12, y: y + 4, class: "label" });
        label.textContent = `${index + 1}`;
        svg.appendChild(label);
      });
    }

    function renderResults(results) {
      resultsEl.innerHTML = "";
      for (const [index, result] of results.entries()) {
        const li = document.createElement("li");
        li.dataset.id = result.id;
        li.innerHTML = `
          <div class="rank">#${index + 1} score ${result.score.toFixed(3)}</div>
          <div class="title">${escapeHtml(result.title_ja || result.title)}</div>
          ${result.title_ja ? `<div class="title-en">${escapeHtml(result.title)}</div>` : ""}
          <div class="meta">${escapeHtml([result.content_type, result.session_name, result.session_room].filter(Boolean).join(" / "))}</div>
          <div class="snippet">${escapeHtml(result.snippet_ja || result.snippet || "")}</div>
          <div class="meta"><a href="${result.url}" target="_blank" rel="noreferrer">SIGCHI program</a></div>
        `;
        li.addEventListener("click", () => setActive(result.id));
        resultsEl.appendChild(li);
      }
    }

    function setActive(id) {
      activeId = id;
      document.querySelectorAll("li").forEach(li => li.classList.toggle("active", li.dataset.id === id));
      document.querySelectorAll("circle[data-id]").forEach(c => {
        const active = c.getAttribute("data-id") === id;
        c.setAttribute("stroke", active ? "#0b7f79" : "#fff");
        c.setAttribute("stroke-width", active ? "5" : "2");
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;"
      }[ch]));
    }

    function appBasePath() {
      return window.location.pathname.replace(/\/$/, "");
    }

    async function runSearch(query) {
      button.disabled = true;
      statusEl.textContent = "検索中";
      try {
        const base = appBasePath();
        const res = await fetch(`${base}/api/search?q=${encodeURIComponent(query)}&top_k=10`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);
        currentResults = data.results;
        lastQueryPoint = data.query_point;
        activeId = null;
        renderMap(data);
        renderResults(data.results);
        statusEl.textContent = `${data.count}件を表示 / ${data.model}`;
      } catch (error) {
        statusEl.textContent = `エラー: ${error.message}`;
      } finally {
        button.disabled = false;
      }
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      const query = queryInput.value.trim();
      if (query) runSearch(query);
    });

    window.addEventListener("resize", () => {
      if (currentResults.length && lastQueryPoint) {
        renderMap({ query_point: lastQueryPoint, results: currentResults });
      }
    });

    runSearch(queryInput.value.trim());
  </script>
</body>
</html>
