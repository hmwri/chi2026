<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHI 2026 Visual Search</title>
  <link rel="stylesheet" href="assets/visual_search.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
</head>
<body>
  <main>
    <section id="mapPane">
      <header>
        <div>
          <h1>CHI 2026 Visual Search</h1>
          <p>検索結果をマップ中心に表示します。点をクリックすると、その論文に近い論文へ探索を広げます。</p>
          <div class="legend">
            <span><span class="dot query-dot"></span>query / selected paper</span>
            <span><span class="dot paper-dot"></span>nearby papers</span>
          </div>
        </div>
        <form id="searchForm">
          <input id="query" name="q" value="視覚障害者のナビゲーション アクセシビリティ" autocomplete="off" aria-label="検索語">
          <button id="submit" type="submit">検索</button>
        </form>
      </header>
      <div id="chart"></div>
    </section>
    <aside id="sidePane">
      <div id="status">読み込み中</div>
      <div id="detail" class="empty">マップ上の点、または検索結果を選択してください。</div>
      <ol id="results"></ol>
    </aside>
  </main>
  <script src="assets/visual_search.js"></script>
</body>
</html>
